<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
/>

<title>Piano Trackmaker</title>

<script src="https://docs.opencv.org/4.13.0/opencv.js"></script>
<script src="https://colxi.info/midi-parser-js/src/main.js"></script>
<script src="https://cdn.jsdelivr.net/npm/onnxruntime-web@1.18.0/dist/ort.min.js"></script>

<script src="//cdn.jsdelivr.net/npm/eruda"></script>
<script>
eruda.init();
</script>

<style>
/* ---------------- GLOBAL ---------------- */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: black;
    color: white;
    font-family: Arial, sans-serif;
}

/* ---------------- APP LAYOUT ---------------- */
#app {
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
}

/* ---------------- TOP BAR ---------------- */
#top-bar {
    background: rgba(20,20,20,0.95);
    padding: 6px 10px;
    z-index: 10;
}

#header {
    text-align: center;
    font-size: 16px;
    padding: 4px;
}

.controls {
    display: flex;
    gap: 6px;
    justify-content: center;
    flex-wrap: wrap;
}

button {
    padding: 10px 14px;
    font-size: 14px;
    background: #0a0;
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    min-width: 110px;
}

button:disabled {
    background: #333;
    color: #888;
}

/* ---------------- MAIN AREA ---------------- */
#main {
    flex: 1;
    display: flex;
    position: relative;
    overflow: hidden;
}

/* ---------------- CANVAS AREA ---------------- */
#canvas-container {
    flex: 1;
    position: relative;
    background: #111;
}

#canvas {
    width: 100%;
    height: 100%;
    display: block;
}

/* ---------------- LANDSCAPE TOOLBAR ---------------- */
#side-bar {
    width: 160px;
    background: rgba(20,20,20,0.9);
    display: flex;
    flex-direction: column;
    gap: 10px;
    padding: 10px;
    z-index: 20;
}

#side-bar button {
    width: 100%;
    min-width: unset;
}

/* ---------------- STATUS ---------------- */
#status {
    position: absolute;
    bottom: 10px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(0,0,0,0.8);
    padding: 6px 14px;
    border-radius: 20px;
    font-size: 13px;
    z-index: 30;
}

/* ---------------- FULLSCREEN BUTTON ---------------- */
#fullscreen-btn {
    position: absolute;
    top: 10px;
    right: 10px;
    z-index: 30;
    padding: 6px 10px;
    background: rgba(0,0,0,0.7);
    border-radius: 6px;
    border: none;
    color: white;
}

/* ---------------- PORTRAIT WARNING ---------------- */
#rotate-warning {
    position: fixed;
    inset: 0;
    background: black;
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 999;
    font-size: 20px;
    text-align: center;
    padding: 20px;
}

/* ---------------- LANDSCAPE MODE ---------------- */
@media (orientation: portrait) {
    #side-bar {
        display: none;
    }

    #rotate-warning {
        display: flex;
    }
}
</style>
</head>

<body>

<div id="rotate-warning">
    Rotate your phone to landscape mode
</div>

<div id="app">

    <!-- TOP BAR -->
    <div id="top-bar">
        <div id="header">Piano Trackmaker</div>
    </div>

    <!-- MAIN AREA -->
    <div id="main">

        <!-- CANVAS -->
        <div id="canvas-container">
            <canvas id="canvas"></canvas>
            <div id="status">Loading...</div>
            <button id="fullscreen-btn">⛶</button>
        </div>

        <!-- LANDSCAPE TOOLBAR -->
        <div id="side-bar">
            <button id="btnWebcam">Start Camera</button>
            <button id="btnCalibrate" disabled>Calibrate</button>
            <button id="btnMIDI" disabled>Select MIDI</button>
            <button id="btnStart" disabled>Start</button>
        </div>

    </div>
</div>

<script type="module">
import './keypointManager.js';
import './pianoManager.js';
import './midiManager.js';
import './trackmaker.js';
</script>

</body>
</html>
