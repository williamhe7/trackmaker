<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Piano Trackmaker</title>

<script src="https://docs.opencv.org/4.13.0/opencv.js"></script>
<script src="https://colxi.info/midi-parser-js/src/main.js"></script>
<script src="https://cdn.jsdelivr.net/npm/onnxruntime-web@1.18.0/dist/ort.min.js"></script>

<script src="//cdn.jsdelivr.net/npm/eruda"></script>
<script>eruda.init();</script>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        background: black;
        overflow: hidden;
        height: 100vh;
        width: 100vw;
        font-family: Arial, sans-serif;
    }

    /* FULLSCREEN AR STAGE */
    #canvas-container {
        position: fixed;
        inset: 0;
        width: 100vw;
        height: 100vh;
        overflow: hidden;
        background: black;
    }

    #canvas {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
    }

    /* OVERLAY UI */
   #top-bar {
       position: fixed;
       top: 0;
       left: 0;
       right: 0;
       z-index: 500;
   
       background: rgba(0,0,0,0);
       backdrop-filter: none;
   
       padding: 6px;
   }

    #header {
        text-align: center;
        color: white;
        font-size: 16px;
        margin-bottom: 4px;
    }

    .controls {
        display: flex;
        justify-content: center;
        gap: 6px;
        flex-wrap: wrap;
    }

    button {
        padding: 10px 14px;
        font-size: 14px;
        border: none;
        border-radius: 8px;
        background: #0a0;
        color: white;
        min-width: 110px;
    }

    button:disabled {
        background: #333;
        color: #777;
    }

    #status {
        position: fixed;
        bottom: 14px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 600;
        background: rgba(0,0,0,0.75);
        padding: 8px 14px;
        border-radius: 20px;
        color: white;
        font-size: 14px;
    }

    #fullscreen-btn {
        position: fixed;
        top: 10px;
        right: 10px;
        z-index: 600;
        padding: 8px 12px;
        background: rgba(0,0,0,0.6);
        color: white;
        border-radius: 6px;
        border: none;
    }

    /* LANDSCAPE OPTIMIZATION */
    @media (orientation: portrait) {
        #header::after {
            content: " (Rotate device for best experience)";
            font-size: 12px;
            opacity: 0.7;
        }
    }
</style>
</head>

<body>

<div id="canvas-container">
    <canvas id="canvas"></canvas>

    <div id="top-bar">
        <div id="header">Piano Trackmaker</div>
        <div class="controls">
            <button id="btnWebcam">Start Camera</button>
            <button id="btnCalibrate" disabled>Recalibrate</button>
            <button id="btnMIDI" disabled>Select MIDI</button>
            <button id="btnStart" disabled>Start Playback</button>
        </div>
    </div>

    <div id="status">Loading...</div>
    <button id="fullscreen-btn">⛶</button>
</div>

<script type="module" src="./trackmaker.js"></script>

</body>
</html>
