<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Piano Trackmaker</title>
    
    <script src="https://docs.opencv.org/4.10.0/opencv.js"></script>
    <script src="https://colxi.info/midi-parser-js/src/main.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/onnxruntime-web@1.18.0/dist/ort.min.js"></script>
    
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            background:#000; color:#fff; font-family:Arial, sans-serif;
            height:100vh; overflow:hidden; display:flex; flex-direction:column;
            touch-action: manipulation;
        }
        #header, .controls {
            background:rgba(20,20,20,0.85); z-index: 100; 
            backdrop-filter: blur(8px);
        }
        #header { padding:8px; text-align:center; }
        .controls {
            padding:8px; display:flex; gap:8px; justify-content:center; flex-wrap:wrap;
        }
        button {
            padding:11px 18px; font-size:15px; background:#0a0; color:white;
            border:none; border-radius:6px; cursor:pointer; min-width:120px;
        }
        button:hover { background:#0c0; }
        button:disabled { background:#444; color:#888; cursor:not-allowed; }

        #canvas-container {
            flex:1; position:relative; background:#000; overflow:hidden;
        }
        #canvas {
            position:absolute; top:0; left:0; width:100%; height:100%;
            image-rendering: crisp-edges;
        }
        #status {
            position:absolute; bottom:12px; left:50%; transform:translateX(-50%);
            background:rgba(0,0,0,0.75); padding:6px 16px; border-radius:20px;
            font-size:14px; z-index:110; white-space:nowrap; pointer-events:none;
        }
