<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Piano Trackmaker</title>
   
    <script src="https://docs.opencv.org/4.10.0/opencv.js"></script>
    <script src="https://colxi.info/midi-parser-js/src/main.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/onnxruntime-web@1.18.0/dist/ort.min.js"></script>
   
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            background:#000; color:#fff; font-family:Arial, sans-serif;
            height:100vh; overflow:hidden; display:flex; flex-direction:column;
        }
        #top-bar {
            background:rgba(20,20,20,0.95); z-index: 300;
            padding:8px 10px;
            position: relative;
        }
        #header { text-align:center; font-size:18px; padding:6px; }
        .controls {
            display:flex; gap:8px; justify-content:center; flex-wrap:wrap; padding:8px;
        }
        button {
            padding:12px 18px; font-size:15px; background:#0a0; color:white;
            border:none; border-radius:8px; cursor:pointer; min-width:125px;
        }
        button:hover:not(:disabled) { background:#0c0; }
        button:disabled { background:#333; color:#888; cursor:not-allowed; }

        #canvas-container {
            flex: 1; position:relative; background:#111; overflow:hidden;
        }
        #canvas {
            width:100%; height:100%; display:block;
            image-rendering: crisp-edges;
        }
        #status {
            position:absolute; bottom:12px; left:50%; transform:translateX(-50%);
            background:rgba(0,0,0,0.8); padding:8px 18px; border-radius:25px;
            font-size:15px; z-index:310; white-space:nowrap; pointer-events:none;
        }
        #fullscreen-btn {
            position:absolute; top:12px; right:12px; z-index:320;
            padding:8px 14px; font-size:14px; background:rgba(0,0,0,0.7);
            color:white; border:none; border-radius:6px;
        }
    </style>
</head>
<body>
    <div id="top-bar">
        <div id="header">Piano Trackmaker</div>
        <div class="controls">
            <button id="btnWebcam">Start Camera</button>
            <button id="btnCalibrate" disabled>Recalibrate</button>
            <button id="btnMIDI" disabled>Select MIDI</button>
            <button id="btnStart" disabled>Start Playback</button>
        </div>
    </div>
   
    <div id="canvas-container">
        <canvas id="canvas"></canvas>
        <div id="status">Loading...</div>
        <button id="fullscreen-btn">⛶ Fullscreen</button>
    </div>

    <script type="module">
        import './keypointManager.js';
        import './pianoManager.js';
        import './midiManager.js';
        import './trackmaker.js';
    </script>
</body>
</html>
