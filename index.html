<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Piano Trackmaker</title>
    
    <script src="https://docs.opencv.org/4.10.0/opencv.js"></script>
    <script src="https://colxi.info/midi-parser-js/src/main.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/onnxruntime-web@1.18.0/dist/ort.min.js"></script>
    
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            background:#111; color:#fff; font-family:Arial, sans-serif;
            height:100vh; overflow:hidden; display:flex; flex-direction:column;
            touch-action: manipulation;
        }
        #header {
            padding:10px; background:#1a1a1a; text-align:center; z-index:10;
        }
        .controls {
            padding:8px; background:#1a1a1a; display:flex; gap:8px; 
            justify-content:center; flex-wrap:wrap; z-index:10;
        }
        button {
            padding:10px 18px; font-size:15px; background:#0a0; color:white;
            border:none; border-radius:6px; cursor:pointer; flex:1; max-width:180px;
        }
        button:hover { background:#0c0; }
        button:disabled { background:#555; }
        
        #canvas-container {
            flex:1; position:relative; background:#000; overflow:hidden;
        }
        #canvas {
            position:absolute; top:50%; left:50%; transform:translate(-50%, -50%);
            max-width:100%; max-height:100%; image-rendering: crisp-edges;
        }
        
        #status {
            position:absolute; bottom:10px; left:50%; transform:translateX(-50%);
            background:rgba(0,0,0,0.7); padding:6px 14px; border-radius:20px;
            font-size:14px; z-index:20; white-space:nowrap;
        }
    </style>
</head>
<body>
    <div id="header"><h2>Piano Trackmaker</h2></div>
    <div class="controls">
        <button id="btnWebcam">Start Camera</button>
        <button id="btnMIDI">Select MIDI</button>
        <button id="btnCalibrate">Recalibrate</button>
        <button id="btnStart" disabled>Start Playback</button>
    </div>
    
    <div id="canvas-container">
        <canvas id="canvas"></canvas>
        <div id="status">Loading libraries...</div>
    </div>

    <script type="module">
        import './keypointManager.js';
        import './pianoManager.js';
        import './midiManager.js';
        import './trackmaker.js';
    </script>
</body>
</html>
